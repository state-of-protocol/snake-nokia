<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nokia 3310 Snake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nokia-frame">
        <div class="nokia-screen">
            <div class="score-board">Score: <span id="score">0</span></div>
            <canvas id="gameCanvas" width="200" height="150"></canvas>
            <div id="game-over" class="hidden">GAME OVER<br>Press Space to Restart</div>
        </div>
        <div class="nokia-logo">NOKIA</div>
    </div>
    <div class="controls-hint">Use Arrow Keys (↑ ↓ ← →) to Play</div>
    <script src="script.js"></script>
</body>
</html>
